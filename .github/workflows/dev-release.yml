name: Dev Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache PyInstaller build
        uses: actions/cache@v4
        with:
          path: |
            build/
            ~\AppData\Roaming\pyinstaller
          key: ${{ runner.os }}-pyinstaller-${{ hashFiles('**/*.py', 'requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pyinstaller-

      - name: Build All (Python + C++ Launcher)
        run: python makefile.py --build-all --dev --archive

      - name: Read app version
        id: version
        run: |
          $ver = python -c "from src.common import app_version; print(app_version)"
          echo "app_version=$ver" >> $env:GITHUB_OUTPUT

      - name: Upload to dev release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: "Dev Build v${{ steps.version.outputs.app_version }} (${{ github.sha }})"
          body: |
            Automated dev build from commit ${{ github.sha }} on branch `${{ github.ref_name }}`.
          prerelease: true
          files: |
            dist/hammer5tools.zip
            dist/version.txt
