name: Stable Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Velopack CLI
        run: |
          dotnet tool install -g vpk
          echo "$HOME\.dotnet\tools" >> $env:GITHUB_PATH

      - name: Build All

        run: python makefile.py --build-all --stable

      - name: Read app version
        id: version
        run: |
          $ver = python -c "from src.common import app_version; print(app_version)"
          echo "app_version=$ver" >> $env:GITHUB_OUTPUT

      - name: Velopack Pack
        run: |
          & "$HOME\.dotnet\tools\vpk.exe" pack --packId Hammer5Tools --packVersion ${{ steps.version.outputs.app_version }} --packDir Hammer5Tools --mainExe Hammer5Tools.exe --icon src/appicon.ico --channel stable



      - name: Velopack Upload
        run: |
          & "$HOME\.dotnet\tools\vpk.exe" upload github --repoUrl https://github.com/dertwist/Hammer5Tools --publish --token ${{ secrets.GITHUB_TOKEN }} --channel stable
